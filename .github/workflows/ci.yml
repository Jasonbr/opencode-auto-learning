name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
n        pip install -r requirements.txt || echo "No requirements.txt"
    
    - name: Lint Python files
      run: |
        pip install flake8
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
    
    - name: Check file structure
      run: |
        echo "Checking project structure..."
        test -f README.md
        test -f LICENSE
        test -f install.sh
        test -d src/
        test -d docs/
        echo "✅ Structure OK"
    
    - name: Test MCP server syntax
      run: |
        python -m py_compile src/mcp/mem0_mcp_server.py
        echo "✅ MCP server syntax OK"

  release:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.sha }}
        release_name: Release ${{ github.sha }}
        body: |
          Auto-learning system for OpenCode
          
          Features:
          - Smart memory extraction
          - Auto skill generation
          - Semantic search
          - Knowledge graph
          - Hermes/Obsidian sync
          
          See README.md for installation instructions.
        draft: true
        prerelease: false
